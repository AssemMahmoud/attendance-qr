<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مسح QR الطلاب</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Cairo',sans-serif;background:#f7f9fc;margin:0;padding:0;}
.container{padding:15px;width:100%;max-width:480px;margin:auto;}
h2{text-align:center;color:#2575fc;font-weight:700;}
#reader{width:100%;margin-top:15px;border:2px solid #2575fc;border-radius:12px;}
input{width:100%;padding:10px;margin-top:10px;border-radius:10px;border:1px solid #ccc;font-size:15px;}
table{width:100%;border-collapse:collapse;font-size:14px;margin-top:15px;}
th,td{padding:10px;border-bottom:1px solid #ddd;text-align:center;}
th{background:#2575fc;color:white;}
button{width:100%;background:#38ef7d;color:white;padding:12px;border:none;border-radius:10px;font-size:16px;cursor:pointer;margin-top:12px;}
button:hover{background:#11998e;}
</style>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
<div class="container">
<h2>مسح QR الطلاب</h2>
<div id="reader"></div>
<input type="text" id="search" placeholder="ابحث باسم أو رقم الجلوس" onkeyup="searchTable()">
<table id="table">
<tr><th>الاسم</th><th>رقم الجلوس</th><th>السكشن</th><th>اليوم</th><th>الوقت</th></tr>
</table>
<button onclick="downloadExcel()">تحميل Excel</button>
</div>

<script>
let students=[]; 
let html5QrCode=new Html5Qrcode("reader");
Html5Qrcode.getCameras().then(devices=>{
  let primary=devices.find(d=>/back|rear/i.test(d.label)&&!/wide/i.test(d.label));
  let cameraId=primary?primary.id:devices[0].id;
  html5QrCode.start(cameraId,{fps:10,qrbox:250},decoded=>{
    try{
      let data=JSON.parse(decoded);
      if(!students.some(s=>s.seat===data.seat)){
        students.push(data);
        let t=document.getElementById("table");
        let r=t.insertRow();
        r.insertCell(0).innerText=data.name;
        r.insertCell(1).innerText=data.seat;
        r.insertCell(2).innerText=data.section;
        r.insertCell(3).innerText=data.day;
        r.insertCell(4).innerText=data.time;
      }
    }catch(e){}
  });
});

function downloadExcel(){
  let ws=XLSX.utils.json_to_sheet(students);
  let wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"attendance");
  XLSX.writeFile(wb,"attendance.xlsx");
}

function searchTable(){
  let f=document.getElementById("search").value.toLowerCase();
  let t=document.getElementById("table");
  for(let i=1;i<t.rows.length;i++){
    let row=t.rows[i];
    row.style.display=[...row.cells].some(c=>c.innerText.toLowerCase().includes(f))?"":"none";
  }
}
</script>
</body>
</html>
