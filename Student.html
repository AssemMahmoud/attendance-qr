<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>توليد QR للطلاب</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Cairo', sans-serif;
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  color: #fff;
  display: flex; justify-content: center; align-items: center; height: 100vh; margin:0;
}
.container {
  background: rgba(0,0,0,0.2);
  padding: 30px; border-radius: 20px; width:90%; max-width:380px; text-align:center;
}
h2{font-size:24px; font-weight:700; margin-bottom:18px;}
input, button{
  width:100%; padding:12px; margin-top:8px; border-radius:10px; border:none; font-size:16px;
}
input{background: rgba(255,255,255,0.3); color:white;}
input::placeholder{color:#f0f0f0;}
button{
  background:#ff416c; color:white; font-weight:bold; cursor:pointer; transition:.3s;
}
button:hover{background:#ff4b2b;}
#qrcode{margin-top:20px;}
</style>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>
<body>
<div class="container">
<h2>توليد QR للطلاب</h2>
<input id="stuName" placeholder="الاسم">
<input id="stuSeat" placeholder="رقم الجلوس">
<input id="stuSection" placeholder="السكشن">
<input id="stuDay" placeholder="اليوم">
<input id="stuTime" placeholder="الوقت">
<button onclick="generateStudentQR()">توليد QR</button>
<div id="qrcode"></div>
</div>

<script>
function generateStudentQR(){
  const name = document.getElementById("stuName").value;
  const seat = document.getElementById("stuSeat").value;
  const section = document.getElementById("stuSection").value;
  const day = document.getElementById("stuDay").value;
  const time = document.getElementById("stuTime").value;
  if(name && seat && section && day && time){
    const data = JSON.stringify({name, seat, section, day, time});
    document.getElementById("qrcode").innerHTML = "";
    QRCode.toCanvas(data,{width:220},(err,canvas)=>{
      if(err){alert("حدث خطأ في توليد QR"); return;}
      document.getElementById("qrcode").appendChild(canvas);
    });
  }else{alert("يرجى ملء جميع الحقول");}
}
</script>
</body>
</html>
